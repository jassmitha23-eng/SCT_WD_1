<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Landing Page</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

/* Navbar */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: transparent;
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    transition: 0.3s;
}

/* Scroll effect */
nav.scrolled {
    background: black;
}

/* Menu */
ul {
    display: flex;
    list-style: none;
}

ul li {
    margin: 0 15px;
}

/* Hover effect */
ul li a {
    color: white;
    text-decoration: none;
    padding: 5px;
    transition: 0.3s;
}

ul li a:hover {
    background: yellow;
    color: black;
    border-radius: 5px;
}

/* Content */
.content {
    height: 200vh;
    padding-top: 100px;
    text-align: center;
}

/* Responsive */
@media (max-width: 768px) {
    ul {
        flex-direction: column;
        background: black;
        position: absolute;
        top: 60px;
        right: 0;
        width: 100%;
    }
}
</style>

</head>
<body>

<!-- Navbar -->
<nav id="navbar">
    <h2 style="color:white;">MySite</h2>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<!-- Content -->
<section class="content">
    <h1>Welcome to My Landing Page</h1>
    <p>Scroll down to see navbar effect</p>
</section>

<script>
// Scroll effect
window.addEventListener("scroll", function () {
    let navbar = document.getElementById("navbar");

    if (window.scrollY > 50) {
        navbar.classList.add("scrolled");
    } else {
        navbar.classList.remove("scrolled");
    }
});
</script>

</body>
</html>
